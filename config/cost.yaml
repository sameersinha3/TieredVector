unit_prices:
  # All prices are in USD ($)
  
  # Tier 1: RAM/Redis (Memorystore for Redis or similar in-memory cache)
  # Based on GCP Memorystore for Redis pricing: ~$0.054/GB/hour = ~$38.88/GB/month
  # Using a simplified estimate for hot tier
  ram_gb_month: 40.0       # USD per GB per month
  
  # Tier 2: SSD/LMDB (GCP Persistent Disk SSD pricing)
  # Standard persistent disk SSD: ~$0.17/GB/month in us-central1
  ssd_gb_month: 0.17       # USD per GB per month
  ssd_read_1k: 0.001       # USD per 1,000 read operations (estimated - disk I/O typically cheaper)
  
  # Tier 3: GCS Standard Storage (cold tier - from official GCS pricing)
  # Source: https://cloud.google.com/storage/pricing
  # Standard storage in us-central1: $0.020/GB/month
  blob_gb_month: 0.020     # USD per GB per month
  blob_get_1k: 0.005       # USD per 1,000 GET operations (Class A)
  blob_put_1k: 0.005       # USD per 1,000 PUT operations (Class A)
  blob_list_1k: 0.0004     # USD per 1,000 LIST operations (Class B)
  egress_gb: 0.12           # USD per GB of data transferred out (first 1TB tier)
  
  # CPU costs for embedding generation
  cpu_core_hour: 0.05       # USD per vCPU core per hour

experiment:
  # Duration of the experiment/service run
  # Used to prorate monthly storage costs: storage_cost = (gb × price_per_month) × (hours / 720)
  # 720 hours = 30 days × 24 hours
  hours: 1.0               # Duration in hours (e.g., 1.0 = 1 hour, 24.0 = 1 day, 720.0 = 1 month)
  
  # Provisioned storage capacity (what you pay for, not actual usage)
  # These are FALLBACK values - the cost calculator will try to calculate actual sizes from data
  # If actual sizes can't be calculated, these values are used instead
  ram_gb: 1.0              # Provisioned RAM/Redis capacity in GB (Tier 1)
  ssd_gb: 2.0              # Provisioned SSD storage capacity in GB (Tier 2)
  blob_gb: 5.0             # Provisioned GCS storage capacity in GB (Tier 3)

performance_targets:
  # Performance targets that both baseline and tiered systems must meet
  # Used for Option 2 evaluation: same performance regime → show cost reductions
  p95_latency_ms: 200.0    # 95th percentile latency must be below this (ms)
  p99_latency_ms: 500.0    # 99th percentile latency must be below this (ms)
  mean_latency_ms: 150.0   # Mean latency should be below this (ms)

